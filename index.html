<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DriveXplorer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>🚗 DriveXplorer</h1>


  <div class="controls">
    <input type="text" id="search" placeholder="Search car brand..." />

    <select id="sort">
      <option value="">Sort</option>
      <option value="az">A-Z</option>
      <option value="za">Z-A</option>
    </select>

    <button id="filterBtn">Filter ID > 1000</button>
    <button id="themeToggle">🌙 Toggle Mode</button>
  </div>

  <div id="loader">Loading...</div>
  <div id="data-container"></div>

  <script src="script.js"></script>
</body>
</html>
